                            {isFlowMode ? (
                                <span className="text-line">
                                    <span className="line-text">{stanza.join(' ')}</span>
                                </span>
                            ) : (
                                stanza.map((line, lineIdx) => (
                                    <span key={lineIdx} className="text-line">
                                        <span className="line-text">{line}</span>
                                        <span className="line-marker">•</span>
                                        {lineIdx < stanza.length - 1 && ' '}
                                    </span>
                                ))
                            )}
                        </div>
                    </div>
                ));
            };

            if (showInfo) {
                return (
                    <div className="main-content song-detail">
                        <div className="controls-bar">
                            <button 
                                className="back-button"
                                onClick={() => setShowInfo(false)}
                            >
                                ← Zurück
                            </button>
                        </div>
                        <div className="info-content">
                            <h1>{appTitle}</h1>
                            <p>{appSubtitle}</p>
                            {appInfo && appInfo.split('\n').map((line, idx) => (
                                <p key={idx}>{line}</p>
                            ))}
                        </div>
                    </div>
                );
            }

            if (selectedSong) {
                return (
                    <div className="main-content song-detail" onClick={handleDoubleTap}>
                        <div className="controls-bar">
                            <button 
                                className="back-button"
                                onClick={(e) => {
                                    e.stopPropagation();
                                    setSelectedSong(null);
                                }}
                            >
                                ← Zurück
                            </button>
                            <div className="zoom-controls">
                                <button 
                                    className="zoom-button"
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        decreaseFontSize();
                                    }}
                                    disabled={fontSize <= 0.7}
                                >
                                    −
                                </button>
                                <span className="zoom-info">{Math.round(fontSize * 100)}%</span>
                                <button 
                                    className="zoom-button"
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        increaseFontSize();
                                    }}
                                    disabled={fontSize >= 2}
                                >
                                    +
                                </button>
                            </div>
                        </div>
                        <div className={`song-content ${flowMode ? 'flow-mode' : ''}`}>
                            <h1>{selectedSong.title}</h1>
                            {formatSongContent(selectedSong.content, flowMode)}
                        </div>
                        {showModeIndicator && (
                            <div className="mode-indicator">
                                {flowMode ? 'Fliesstext' : 'Zeilenweise'}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <>
                    <header className="header">
                        <h1 className="header-title" onClick={() => setShowInfo(true)}>
                            {appTitle}
                        </h1>
                        <div className="search-container">
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Durchsuche Titel und Text..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                autoComplete="off"
                            />
                            {searchQuery && (
                                <div className="search-info">
                                    Suche in Titel und Liedtext
                                </div>
                            )}
                        </div>
                    </header>
                    <main className="main-content">
                        {searchQuery && filteredSongs.length > 0 && (
                            <div className="result-count">
                                {filteredSongs.length} {filteredSongs.length === 1 ? 'Lied gefunden' : 'Lieder gefunden'}
                            </div>
                        )}
                        {filteredSongs.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-state-icon">♪</div>
                                <div className="empty-state-text">
                                    {searchQuery 
                                        ? `Keine Lieder mit "${searchQuery}" gefunden`
                                        : 'Keine Lieder gefunden'
                                    }
                                </div>
                            </div>
                        ) : (
                            <div className="song-list">
                                {filteredSongs.map(song => {
                                    const preview = getPreviewText(song.content, searchQuery);
                                    const titleMatch = song.title.toLowerCase().includes(searchQuery.toLowerCase());
                                    
                                    return (
                                        <div
                                            key={song.id}
                                            className="song-item"
                                            onClick={() => setSelectedSong(song)}
                                        >
                                            <div className="song-title">
                                                {searchQuery && titleMatch
                                                    ? highlightText(song.title, searchQuery)
                                                    : song.title
                                                }
                                            </div>
                                            {searchQuery && !titleMatch && (
                                                <div className="song-preview">
                                                    {highlightText(preview, searchQuery)}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
