    <style>
        :root {
            --bg-primary: #1a1410;
            --bg-secondary: #2a241d;
            --bg-tertiary: #3a3328;
            --text-primary: #f5ede0;
            --text-secondary: #d4c4a8;
            --accent: #d4a574;
            --accent-bright: #e8c298;
            --shadow: rgba(0, 0, 0, 0.5);
            --line-marker: #8a7a64;
            --font-scale: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(212, 165, 116, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(212, 165, 116, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(26, 20, 16, 0.98) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
            padding: 1.2rem 1rem 0.8rem;
            z-index: 100;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: calc(1.8rem * var(--font-scale));
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            margin-bottom: 0.7rem;
            background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.8s ease-out;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .header-title:hover,
        .header-title:active {
            transform: scale(1.02);
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: calc(1rem * var(--font-scale));
            font-family: 'Crimson Text', serif;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .search-info {
            text-align: center;
            margin-top: 0.4rem;
            font-size: calc(0.85rem * var(--font-scale));
            color: var(--text-secondary);
            font-style: italic;
        }

        .main-content {
            padding: 1.5rem 1rem;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 1s ease-out 0.4s backwards;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .song-item {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .song-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .song-item:hover::before,
        .song-item:active::before {
            opacity: 1;
        }

        .song-item:hover,
        .song-item:active {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.2);
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: calc(1.3rem * var(--font-scale));
            font-weight: 600;
            color: var(--accent-bright);
            position: relative;
        }

        .song-preview {
            margin-top: 0.4rem;
            font-size: calc(0.9rem * var(--font-scale));
            color: var(--text-secondary);
            opacity: 0.8;
            line-height: 1.3;
            max-height: 2.6em;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .song-preview mark {
            background-color: rgba(212, 165, 116, 0.3);
            color: var(--accent-bright);
            padding: 0 0.2em;
            border-radius: 3px;
        }

        .song-detail {
            animation: slideIn 0.4s ease-out;
        }

        .controls-bar {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--accent-bright);
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            font-family: 'Crimson Text', serif;
            font-size: calc(1rem * var(--font-scale));
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-button:hover,
        .back-button:active {
            background: var(--accent);
            color: var(--bg-primary);
            transform: translateX(-4px);
        }

        .zoom-controls {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .zoom-button {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            color: var(--accent-bright);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-button:hover,
        .zoom-button:active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .zoom-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .zoom-info {
            font-size: calc(0.9rem * var(--font-scale));
            color: var(--text-secondary);
            min-width: 3rem;
            text-align: center;
        }

        .song-content {
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 30px var(--shadow);
            position: relative;
        }

        .song-content h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: calc(1.9rem * var(--font-scale));
            font-weight: 700;
            color: var(--accent-bright);
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 0.03em;
        }

        .info-content {
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 30px var(--shadow);
            text-align: center;
        }

        .info-content h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: calc(2.2rem * var(--font-scale));
            font-weight: 700;
            color: var(--accent-bright);
            margin-bottom: 1.5rem;
            letter-spacing: 0.03em;
        }

        .info-content p {
            font-size: calc(1.2rem * var(--font-scale));
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .stanza {
            margin-bottom: 1rem;
            position: relative;
        }

        .stanza-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            gap: 0.7rem;
        }

        .stanza-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: calc(1.5rem * var(--font-scale));
            font-weight: 700;
            color: var(--accent);
            min-width: 2rem;
            flex-shrink: 0;
        }

        .stanza-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--accent) 0%, transparent 100%);
            opacity: 0.5;
        }

        .stanza-text {
            padding-left: 0.5rem;
        }

        .text-line {
            display: block;
            margin-bottom: 0.25rem;
            line-height: 1.55;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .line-text {
            font-size: calc(1.15rem * var(--font-scale));
            color: var(--text-primary);
        }

        .line-marker {
            color: var(--line-marker);
            font-size: calc(0.8rem * var(--font-scale));
            opacity: 0.6;
            margin-left: 0.5rem;
        }

        .song-content.flow-mode .stanza-text {
            font-size: 0;
            color: var(--text-primary);
            line-height: 1.7;
            text-align: left;
            hyphens: none;
            -webkit-hyphens: none;
            -moz-hyphens: none;
            -ms-hyphens: none;
            word-break: normal;
            overflow-wrap: normal;
            word-wrap: normal;
        }

        .song-content.flow-mode .text-line {
            display: inline;
            margin-bottom: 0;
            word-break: normal;
            overflow-wrap: normal;
            word-wrap: normal;
            hyphens: none;
            -webkit-hyphens: none;
        }

        .song-content.flow-mode .line-text {
            font-size: calc(1.15rem * var(--font-scale));
            word-break: normal;
            overflow-wrap: normal;
            word-wrap: normal;
            hyphens: none;
            -webkit-hyphens: none;
        }

        .song-content.flow-mode .line-marker {
            display: none;
        }

        .mode-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            font-size: calc(1.2rem * var(--font-scale));
            color: var(--accent-bright);
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            animation: fadeInOut 1.5s ease-out;
            box-shadow: 0 8px 30px var(--shadow);
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: calc(3.5rem * var(--font-scale));
            margin-bottom: 0.8rem;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: calc(1.1rem * var(--font-scale));
            font-family: 'Crimson Text', serif;
        }

        .result-count {
            text-align: center;
            margin-bottom: 0.8rem;
            font-size: calc(0.95rem * var(--font-scale));
            color: var(--accent);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (min-width: 768px) {
            .header-title {
                font-size: calc(2rem * var(--font-scale));
            }

            .song-content h1 {
                font-size: calc(2.2rem * var(--font-scale));
            }

            .line-text {
                font-size: calc(1.3rem * var(--font-scale));
            }

            .song-content.flow-mode .stanza-text {
                font-size: calc(1.3rem * var(--font-scale));
            }

            .stanza-number {
                font-size: calc(1.7rem * var(--font-scale));
            }

            .song-content {
                padding: 2.5rem 2rem;
            }
        }

        @media (min-width: 1024px) {
            .line-text {
                font-size: calc(1.4rem * var(--font-scale));
            }

            .song-content.flow-mode .stanza-text {
                font-size: calc(1.4rem * var(--font-scale));
            }

            .stanza-number {
                font-size: calc(1.8rem * var(--font-scale));
            }

            .song-content {
                padding: 3rem 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: calc(1.5rem * var(--font-scale));
            }

            .song-content h1 {
                font-size: calc(1.6rem * var(--font-scale));
            }

            .line-text {
                font-size: calc(1.05rem * var(--font-scale));
            }

            .song-content.flow-mode .stanza-text {
                font-size: calc(1.05rem * var(--font-scale));
            }

            .stanza-number {
                font-size: calc(1.3rem * var(--font-scale));
            }

            .song-content {
                padding: 1.5rem 1rem;
            }
        }

        @media (hover: none) {
            .song-item:active {
                background: var(--bg-tertiary);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const SONGS_DATA = `
# SAT Cantusprügel

SAT Cantusprügel in HTML. Version 18. Stand: 5. Dez. 2025


# Hundert Semester

Als ich schlummernd lag heut Nacht, lockten süsse Träume, schimmernd in
der Jugend Pracht, mich in ferne Räume. Krasses Füchslein sass ich schlank
in der Kneipe wieder, und in vollem Chore klang laut das Lied der Lieder:
la: Gaudeamus igitur, iuvenes dum sumus! : post iucundam iuventutem, post
molestam senectutem : nos habebit humus. :

Tabakswolkenduft umkreist bläulich Rheinweinbecher; desto heller flammt
der Geist in dem Haupt der Zecher. Füchslein fühlt im Weltenrund sich der
Schöpfung Krone, und er singt mit keckem Mund und mit keckem Tone:
laUbi sunt qui ante nos in mundo fuere? Vadite ad superos, transite ad
inferos, ubi iam fuere.

Jäh erwacht’ ich. – Glockenklar tönt’ mir’s in den Ohren: Heut sind’s runde
siebzig Jahr, seit du wardst geboren. Heut schon liegen hinter dir der
Semester hundert! – Hell rieb ich die Augen mir, summte still verwundert:
laVita nostra brevis est, brevi finietur, venit mors velociter, rapit nos atrociter,
nemini parcetur.

Schnell vom Lager sprang ich auf, rief: Mir hat das Leben viel in seinem
kurzen Lauf, Leid und Lust, gegeben. Sei vergessen, was gedrückt mich mit
Sorg und Plage; heut ein Hoch dem, was beglückt’ meine jungen Tage:
lavivat academia, vivant professores, vivat membrum quodlibet, vivant
membra quaelibet, semper sint in flore!

Gold’ne Burschenzeit entflog schnell – dass Gott erbarme! Ledern’
Philisterium zog mich in dürre Arme. Doch philistern lernt’ ich nicht, hoch,
auf gold’nen Schwingen, trug mich Lieb’ zum Himmelslicht, jubelnd durft’
ich singen: laVivant omnes virgines, faciles, formosae! vivant et mulieres,
tenerae, amabiles, bonae, laboriosae!

Weib und Kinder an der Hand, freut’ ich mich des Lebens; nützlich sein dem
Vaterland, ward das Ziel des Strebens. Konnte sich’s zum Paradies auch nicht
ganz gestalten, Treue, die ich ihm erwies, hat’s mir doch gehalten. laVivat et
res publica et qui illam regit! Vivat nostra civitas, maecenatum caritas, quae
nos hic protegit!

Im latein’schen Liede sang heut ich alter Knabe meines Lebens ganzen Gang
von der Wieg’ zum Grabe; komme, wann du willst, Freund Hein, mich zur
Ruh’ zu bringen; doch wie einst als Füchselein, will der Greis noch singen:
laPereat tristitia, pereant osores! Pereat diabolus, quivis anti burschius, atque
irrisores!


# O goldne Akademia

Als noch Arkadiens goldne Tage mich jungen Burschen angelacht, wie hab
ich da in süssem Taumel die frohen Stunden hingebracht; leicht war mein
Herz und leicht mein Wechsel, die gar zu bald davongerauscht! Und doch
hätt ich mit keinem Fürsten in jener Seligkeit getauscht; : war selbst ein Fürst
der Freude ja, o goldne Akademia! :

Zwar tat mein Vater häufig schreiben: mein Sohn, geh ins Kollegium; doch
oftmals wider meinen Willen bracht mich der Zufall neckisch drum; bald
galt’s ein Fässchen anzustechen, bald lag ich draussen auf Mensur! Die Lust
am Zechen und am Pauken liegt in des Burschen Frohnatur. : Wer schilt das
krasse Füchslein da? O goldne Akademia! :

Ging ich entlang die engen Gassen, aufs Haupt das Cerevis gedrückt, hei, wie
die schmucken Mädchen lachten, wenn freundlich ich emporgenickt; den
Weibern war ich wohlgewogen, als stets verliebter Musensohn, gern hätt’ ich
aller Herz besessen, doch eines war mein eigen schon, : des schönsten
Mädchens, das ich sah, o goldne Akademia! :

Ach, pfeilschnell flogen die Semester, ein altes Haus nennt man mich heut,
nun hat auch mir auf meine Locken der Winter seinen Reif gestreut; doch
nimmer will ich dich vergessen, der holden Freiheit Paradies, die schönste
Zeit in meinem Leben, da ich noch flotter Bursche hiess; : stets bleib ich dir
im Geiste nah, o goldne Akademia! :


# Donaustrudel

Als wir jüngst in Regensburg waren, sind wir über den Strudel gefahren. Da
war’n viele Holden, die mit fahren wollten. : Schwäbische, bayrische
Dirndel, juchheisasa! muss der Schiffsmann fahren. :

Und vom hohen Bergesschlosse kam auf stolzem schwarzem Rosse adlig
Fräulein Kunigund, wollt’ mitfahr’n über Strudels Grund. Schwäbische usw.

«Schiffsmann, lieber Schiffsmann mein, sollt’s denn so gefährlich sein?
Schiffsmann, sag’s mir ehrlich, ist’s denn so gefährlich?» Schwäbische usw.

Wem der Myrtenkranz geblieben, landet froh und sicher drüben; wer ihn hat
verloren, ist dem Tod erkoren. Schwäbische usw.

Als sie auf die Mitt’ gekommen, kam ein grosser Nix geschwommen, nahm
das Fräulein Kunigund, fuhr mit ihr in des Strudels Grund. Schwäbische usw.

Und ein Mädel von zwölf Jahren ist mit über den Strudel gefahren; weil sie
noch nicht lieben kunnt’, fuhr sie sicher über Strudels Grund. Schwäbische
usw.


# Lied des Trompeters von Säckingen

Alt-Heidelberg, du feine, du Stadt an Ehren reich, am Neckar und am Rheine,
kein’ andre kommt dir gleich. Stadt fröhlicher Gesellen, an Weisheit schwer
und Wein, klar zieh’n des Stromes Wellen, Blauäuglein blitzen
drein, : Blauäuglein blitzen drein. :

Und kommt aus lindem Süden der Frühling übers Land, so webt er dir aus
Blüten ein schimmernd’ Brautgewand. Auch mir stehst du geschrieben ins
Herz gleich einer Braut, es klingt wie junges Lieben dein Name mir so traut.

Und stechen mich die Dornen und wird mir’s drauss’ zu kahl, geb’ ich dem
Ross die Spornen und reit’ ins Neckartal!


# Am Waldesrand ’ne Mühle stand

Am Waldesrand ’ne Mühle stand rumbadibumbadirumbadibadibum, es
drehte sich das Mühlerad rumbadibumbadirumbadibadibum, es waren in der
Mühle drin rumbadibumbadirumbadibadibum, der Müller und die Müllerin
ah ah ah. − Ja du holde kleine Müllerin ah ah ah, ja wie gerne wär ich bei dir
drin ah ah ah. Ja wie glücklich ich mich fühlte ah ah ah, in deiner kleinen
Mühle drin ah ah ah!

Da kam des Wegs ein Wandersmann rumbadi ... und klopfte an der Mühle an
rumbadi ... es öffnet ihm die Müllerin rumbadi ... flugs war er in der Mühle
drin ah ah ah. – Ja du holde kleine Müllerin usw.

Es löschte aus das Kerzenlicht rumbadi ... was dann geschah, das weiss man
nicht rumbadi ... es waren in der Mühle drin rumbadi ... der Wandrer und die
Müllerin ah ah ah. – Ja du holde kleine Müllerin usw.


# Warnung vor dem Rhein

An den Rhein, an den Rhein, zieh nicht an den Rhein, mein Sohn, ich rate dir
gut; da geht dir das Leben zu lieblich ein, da blüht dir zu freudiger Mut!

Siehst die Mädchen so frank und die Männer so frei, als wär’ es ein adlig
Geschlecht, gleich bist du mit glühender Seele dabei; so dünkt es dich billig
und recht.

Und zu Schiffe, wie grüssen die Burgen so schön und die Stadt mit dem
ewigen Dom! In den Bergen, wie klimmst du zu schwindelnden Höh’n und
blickest hinab in den Strom.

Und im Strome, da tauchet die Nix’ aus dem Grund, und hast du ihr Lächeln
geseh’n, und sang dir die Lurlei mit bleichem Mund, mein Sohn, so ist es
gescheh’n.

Dich bezaubert der Laut, dich betöret der Schein, Entzücken fasst dich und
Graus. Nun singst du nur immer: Am Rhein, am Rhein! und kehrst nicht
wieder nach Haus.


# Alle zerstreut

Auf den Bergen die Burgen, im Tale die Saale, die Mädchen im Städtchen
einst alles wie heut. Ihr werten Gefährten, wo seid ihr zur Zeit mir, ihr
Lieben, geblieben? : Ach, alle zerstreut! :

Die einen, sie weinen; die andern, sie wandern; die dritten noch mitten im
Wechsel der Zeit; auch viele am Ziele, zu den Toten entboten, verdorben,
gestorben in Lust und in Leid.

Ich alleine, der eine, schau’ wieder hernieder zur Saale im Tale, doch traurig
und stumm. Eine Linde im Winde, die wiegt sich und biegt sich, rauscht
schaurig und traurig; ich weiss wohl warum!


# Bierlein rinn!

Beim Rosenwirt am Grabentor des Abends um halb sechs den Hammer
schwingt der Wirt empor und schlägt den Zapfen ex! Das schlurrt und glurrt
aus feuchter Nacht vom Spundloch in die Kann’, ei seht, wies Antlitz jedem
lacht, jedwedem Zechersmann: : «Bierlein, rinn! Bierlein, rinn! Was nutzen
mir die Kreuzerlein, wenn ich gestorben bin!» :

Beim Rosenwirt im Stübel drin, da sitzt ein junges Blut, die schmucke,
schlanke Kellnerin war ihm noch gestern gut. Doch heute ist sie
durchgebrannt, fahr wohl, du falsche Hex’! Der Bursch kehrt sein Gesicht
zur Wand und summt um halber sechs: «Bierlein rinn» usw.

Beim Rosenwirt am Eichentisch, da thront ein braver Greis, die Wangen rot,
die Augen frisch, die Haare silberweiss! Schlug ihm gleich manchen grossen
Plan das Schicksal schnöd entzwei − um halber sechs schlägt auch wer an,
der Alte brummt dabei: «Bierlein rinn» usw.

Beim Rosenwirt am Grabentor, da blüht ein fein Gewächs, das heben wir im
Glas empor schon abends um halb sechs. Wir heben es gar emsig hoch, wir
leeren’s auf den Grund − um Mitternacht da klingt es noch, schallt’s noch
von Mund zu Mund: «Bierlein rinn» usw.

Und schlägt mir einst der Sensenmann den Nagel auf die Truh, rast’ ich von
harter Lebensbahn, in kühler Grabesruh: dann schwingt bekränzt den Becher
mir, dem müden Wandersmann, der euch gelehrt den Spruch zum Bier, und
hebet also an: «Bierlein rinn» usw.


# Rheinweinlied

Bekränzt mit Laub den lieben vollen Becher : und trinkt ihn fröhlich leer! : In
ganz Europia, ihr Herren Zecher, : ist solch ein Wein nicht mehr, ist solch ein
Wein nicht mehr! :

Er kommt nicht her aus Ungarn noch aus Polen noch wo man franzmänn’sch
spricht; da mag Sankt Veit, der Ritter, Wein sich holen, wir holen ihn da
nicht.

Am Rhein, am Rhein, da wachsen unsre Reben: Gesegnet sei der Rhein! Da
wachsen sie am Ufer hin und geben uns diesen Labewein.

So trinkt ihn denn, und lasst uns allewege uns freu’n und fröhlich sein! Und
wüssten wir, wo jemand traurig läge, wir gäben ihm den Wein.


# Lied eines abziehenden Burschen

Bemooster Bursche zieh’ ich aus, behüt dich Gott, Philisterhaus! : Zur alten
Heimat geh’ ich ein, muss selber nun Philister sein! :

Fahrt wohl, ihr Strassen grad und krumm! Ich zieh’ nicht mehr in euch
herum, durchtön’ euch nicht mehr mit Gesang, mit Lärm nicht mehr und
Sporenklang.

Was wollt ihr Kneipen all von mir? Mein Bleiben ist nicht mehr allhier;
winkt nicht mit eurem langen Arm, macht mir mein durstig Herz nicht warm.

Ei, grüss euch Gott, Collegia! Wie steht ihr in Parade da! Ihr dumpfen Säle
gross und klein, jetzt kriegt ihr mich nicht mehr herein.

Auch du, von deinem Giebeldach, siehst mir umsonst, o Karzer, nach! Für
schlechte Herberg Tag und Nacht sei dir ein Pereat gebracht.

Du aber blüh und schalle noch, leb, alter Schlägerboden, hoch! In dir, du
treues Ehrenhaus, verfechte sich noch mancher Strauss!

Da komm’ ich, ach! an Liebchens Haus; o Kind, schau noch einmal heraus,
heraus mit deinen Äuglein klar, mit deinem dunklen Lockenhaar!

Und hast du mich vergessen schon, so wünsch’ ich dir nicht bösen Lohn;
such dir nur einen Buhlen neu, doch sei er flott, gleich mir, und treu!

Und weiter, weiter geht mein Lauf: tut euch, ihr alten Tore auf! Leicht ist
mein Sinn, und froh mein Pfad; gehab dich wohl, du Musenstadt!

Ihr Brüder, drängt euch um mich her, macht mir mein leichtes Herz nicht
schwer! Auf frischem Ross, mit frohem Sang, geleitet mich den Weg entlang!

Im nächsten Dorfe kehret ein, trinkt noch mit mir von einem Wein! Nun
denn, ihr Brüder, sei’s weil’s muss, das letzte Glas, der letzte Kuss!


# Bin ein fahrender Gesell

Bin ein fahrender Gesell, kenne keine Sorgen, labt mich heut ein Felsenquell,
tut es Rheinwein morgen. Bin ein Ritter lobesam, reit’ auf Schusters Rappen,
führ’ den lockren Zeisighahn und den Spruch im Wappen. : Nur immer lustig
Blut und leichten Sinn, futsch ist futsch und hin ist hin! :

Zieh ich in ein Städtchen ein, spür ich’s im Gehirne, wo man trifft den besten
Wein und die schönste Dirne. Spielmann lächelt wohlgemut, streicht die
Fiedel schneller, und ich werf’ ihm in den Hut meinen letzten Heller. Nur
immer lustig usw.

Meister Wirt, darfst heut nicht ruh’n, schlag heraus den Zapfen! Back, Frau
Wirtin, mir ein Huhn und zum Nachtisch Krapfen! Was ich heut nicht zahlen
kann, zahlen will ich’s künftig, darum schreibt’s mit Kreide an, Wirt und seid
vernünftig: Nur immer lustig usw.

Wein dir nicht die Äuglein trüb, Mägdelein, vor Trauer! Fahrender Gesellen
Lieb’ ist von kurzer Dauer. Fahrender Gesellen Lieb’ endet vor den Toren,
wein’ dir nicht die Äuglein trüb: hast nicht viel verloren. Nur immer lustig
usw.

Kommt ein Stern mit einem Schwanz, will die Welt zertrümmern, leiert euren
Rosenkranz, mich soll’s wenig kümmern. Wird dem Weltenbrand zum Raub
Berg und Wald und Heide, wird das Wirtshaus auch zu Staub, schwarzes
Brett und Kreide. Nur immer lustig usw.


# Burschen heraus!

Burschen heraus! Lasset es schallen von Haus zu Haus! Wenn der Lerche
Silberschlag grüsst des Maien ersten Tag, dann heraus, und fragt nicht viel,
frisch mit Lied und Lautenspiel! Burschen heraus!

Burschen heraus! Lasset es schallen von Haus zu Haus! Ruft um Hilf’ die
Poesei gegen Zopf und Philisterei, dann heraus bei Tag und Nacht, bis sie
wieder frei gemacht! Burschen heraus!

Burschen heraus! Lasset es schallen von Haus zu Haus! Wenn es gilt fürs
Vaterland, treu die Klingen dann zur Hand, und heraus mit mut’gem Sang,
wär’ es auch zum letzten Gang! Burschen heraus!

gsw


# Gilberte de Courgenay

By Prunterut im Jura, da hät e Wirt es Huus, da luegt es Meitschi alli Stund
dreimaal zum Feischter us. Und fragsch du denn d’Soldate, wer ächt das
Meitschi sei, so lüpft es jedem Schwyzerbueb sys Herz und au sys Bei.
fr: C’est la petite Gilberte, Gilbert’ de Courgenay; elle connaît trois cent mill’
soldats et tous les officiers. C’est la petite Gilberte, Gilbert’ de Courgenay; on
la connaît dans toute la Suisse et toute l’armée. :

Syg eine-n en Trompeter, syg eine-n en Tambour, sig eine simple Solidat, si
het si a der Schnur, vom Korporal zum Lütenant, bis ufe zum Major, wer het
die alli mitenand bim Zipfel und bim Ohr? frC’est usw.

Und frogsch: Was Tüfels het sie denn, isch die denn gar so schön? Ah was,
ich han scho i der Schwyz mängs Tusig Schöneri g’see. S’weiss keine rächt,
wora das lyt am Aug oder am Schueh, doch das isch wurscht, me wird
verruckt und rüeft enander zue: frC’est usw.

Und gäbt me mir es Regiment, ich säiti: O herrje, o wär i doch nur Lütenant,
und nur in Courgenay! Was nütze mir all Offizier und über tusig Maa, ich
muess bim Herrgott Sapperment ganz öppis anders ha! frC’est usw.

Und wenn der Chrieg denn dure isch und alles heizue goht, und denn der
Wirtin ihres Huus leer a der Strasse’ denn stoht; wer wüscht am Fänschter
d’Äugli uus und lueget i d’Ajoie und trured um die dreimalhunderttusig
Maa? fr: C’est la petite Gilberte, Gilbert’ de Courgenay; elle cherche ses trois
cent mill’ soldats et tous les officiers. C’est la petite Gilberte, Gilbert’ de
Courgenay; elle pleure maintenant pour tout’ la Suisse et tout’ l’armée. :


# Kneipgelage

frÇa ça geschmauset, lasst uns nicht rappelköpfisch sein! Wer nicht
mithauset, der bleib daheim! la: Edite, bibite, collegiales! post multa saecula
pocula nulla! :

Der Herr Professor liest heute kein Kollegium: drum ist es besser, man trinkt
eins’ rum. laEdite usw.

Trinkt nach Gefallen, bis ihr die Finger danach leckt; dann hat’s uns allen
recht wohl geschmeckt. laEdite usw.

Auf, auf, ihr Brüder! erhebt den Bacchus auf den Thron und setzt euch
nieder, wir trinken schon. laEdite usw.

So lebt man immer, solang der junge Lenz uns blinkt und Jugendschimmer
die Wangen schminkt. laEdite usw.

So lebt man lustig, weil es noch flotter Bursche heisst, bis dass man rüstig ad
patres reist. laEdite usw.

Bis dass mein Hieber vom corpus iuris wird besiegt, so lang, ihr Brüder, leb’
ich vergnügt! laEdite usw.

Denkt oft, ihr Brüder, an unsre Jugendfröhlichkeit, sie kehrt nicht wieder, die
gold’ne Zeit! laEdite usw.


# Crambambuli

Crambambuli, das ist der Titel des Tranks, der sich bei uns bewährt; er ist ein
ganz probates Mittel, wenn uns was Böses widerfährt. Des Abends spät, des
Morgens früh trink’ ich mein Glas Crambambuli, Crambimbambambuli,
Crambambuli!

Bin ich im Wirtshaus abgestiegen gleich einem grossen Cavalier, dann lass’
ich Brot und Braten liegen und greife nach dem Pfropfenzieh’r; dann bläst
der Schwager tantari zu einem Glas Crambambuli, ...

Reisst mich’s im Kopf, reisst mich’s im Magen, hab’ ich zum Essen keine
Lust, wenn mich die bösen Schnupfen plagen, hab’ ich Katarrh auf meiner
Brust: was kümmern mich die Medici? Ich trink’ mein Glas Crambambuli, ...

Wär’ ich zum grossen Herrn geboren, wie Kaiser Maximilian, wär’ mir ein
Orden auserkoren, ich hängte die Devise dran: fr«Toujours fidele et sans
souci, c’est l’ordre du Crambambuli, ...»

Ist mir mein Wechsel ausgeblieben, hat mich das Spiel labet gemacht, hat mir
mein Mädchen nicht geschrieben, ein’n Trauerbrief die Post gebracht; dann
trink’ ich aus Melancholie ein volles Glas Crambambuli, ...

Ach, wenn die lieben Eltern wüssten der Herren Söhne grosse Not, wie sie so
flott verkeilen müssten, sie weinten sich die Äuglein rot! Indessen tun die
filii sich bene beim Crambambuli, ...

Und hat der Bursch kein Geld im Beutel, so pumpt er die Philister an und
denkt: Es ist doch alles eitel, vom Burschen bis zum Bettelmann; denn das ist
die Philosophie im Geiste des Crambambuli, ...

Soll ich für Ehr und Freiheit fechten, für Burschenwohl den Schläger
ziehn’n, gleich blinkt der Stahl in meiner Rechten, ein Freund wird mir zur
Seite stehn. Dann trinkt man nach gehabter Müh’ ein volles Glas
Crambambuli, ...!

Ihr dauert mich, ihr armen Toren, ihr liebet nicht, ihr trinkt nicht Wein; zu
Eseln seid ihr auserkoren, und dorten wollt ihr Engel sein; sauft Wasser wie
das liebe Vieh und meint, es sei Crambambuli, ...!

Crambambuli soll mir noch munden, wenn jede andre Freude starb, wenn
mich Freund Hein beim Glas gefunden und mir die Seligkeit verdarb: ich
trink’ mit ihm in Companie das letzte Glas Crambambuli, ...

Wer wider uns Crambambulisten sein hämisch Maul zur Missgunst rümpft,
den halten wir für keinen Christen, weil er auf Gottes Gabe schimpft; ich
gäb’ ihm, ob er Zeter schrie, nicht einen Schluck Crambambuli, ...!


# Segen im Trinken

: Das Essen, nicht das Trinken bracht’ uns ums Paradies. : Was Adam einst
verloren durch seinen argen Biss, : das gibt der Wein uns wieder, der Wein
und frohe Lieder. :

Und als die Welt aufs Neue in Baucheslust versank, und in der Sünde Fluten
die Kreatur ertrank, blieb Noah doch am Leben, der Pflanzer edler Reben.

Er floh mit Weib und Kinder wohl in sein grösstes Fass, das schwamm hoch
auf den Fluten, und keiner wurde nass. So hat der Wein die Frommen dem
Wassertod entnommen.

Und als die Flut zerronnen, da blieb das runde Haus auf einem Berge sitzen,
und alle stiegen aus, begrüssten froh das Leben und pflanzten neue Reben.

Das Fass blieb auf dem Berge zum Angedenken stehn, zu Heidelberg am
Neckar könnt ihr es selber sehn. Nun wisst ihr, wer die Reben am Rhein hat
uns gegeben.

Und will noch einer wagen, den heil’gen Wein zu schmähn, der soll in
Wasserfluten erbärmlich untergehn. Stosst an und singt, ihr Brüder: Hoch
Wein und frohe Lieder!


# Studenten-Liebchen

Das Mädel aus dem ersten Stock im Haus mir grade gegenüber, das hatt’ ich
längst schon heimlich gern und Tag für Tag noch lieber. Sie sah so oft
verstohlen hin und lauschte hinterm Flieder, bis endlich winkte ihre Hand,
dass sie des Liedes Sinn verstand: Schwarze Maid in deinem stillen
Stübchen, komm zu mir und werde mein Feinsliebchen, : komm zu mir und
sei mir lieb und treu, denn das Semester ist so schnell vorbei. :

Die Holde brannte endlich durch, ich brachte sie auf meine Bude, das zweite
Mal kam sie von selbst, jetzt ist sie meine Trude. Vorm Fenster steht der
Fliederbaum, die Laute hängt am Nagel, wir sitzen auf dem Kanapei und
küssen nach der Melodei: Schwarze Maid in deinem stillen Stübchen, bleib
bei mir und küsse mich, Feinsliebchen, bleib bei mir und herze mich aufs
neu’, denn das Semester ist so schnell vorbei.

Der weisse Flieder ist verblüht, Semesterklang hat ausgeklungen, da hab’ ich
meiner schwarzen Maid mein Lebewohl gesungen. Sie weinte nicht, sie hielt
mich nicht, sie sah nur in die Ferne und winkte lächelnd gute Reise, ich
summt’ dabei die alte Weise: Schwarze Maid in deinem stillen Stübchen, lebe
wohl und bleibe mein Feinsliebchen, lebe wohl, du Land der Poesei, ach, das
Semester war so schnell vorbei.


# Das schwarzbraune Bier

Das schwarzbraune Bier, das trink’ ich so gern und schwarzbraune Mädel, die
küss’ ich so gern; : ei du, ei du, ei du charmantes Dudeldudeldei,
juvivallerallera, juvivallerallera, du lässt mir keine Ruh. :

Mein Schatz hat zwei Äugelein, die glänzen wie zwei Sternelein; ei du usw.

Mein Schatz hat ein rosiges Kinn und in der Mitt’ ein Grüblein drin; ei du
usw.

Mein Schatz hat einen rosigen Mund, und wer den küsst, der wird gesund; ei
du usw.


# Der Graf von Rüdesheim

Das war der Graf von Rüdesheim, mit Gütern reich beglückt, der hat des
Winzers holder Maid zu tief ins Aug’ geblickt. Doch als er ihr die Lieb’
gestand, lacht sie ihm ins Gesicht; der Graf ritt tief gekränkt nach Haus und
mied des Tages Licht. : Und er sass und vergass in seiner Burg am Rhein
seinen Schmerz, denn das Herz tröstet Rüdesheimer Wein. :

Wohl sieben Jahre sass er so geschieden von der Welt und gab für
Rüdesheimer Wein hin all sein Gut und Geld; wohl vierzig Güter gab er hin
für edles Rebenblut, und als das letzte Jahr verging, ging auch das letzte Gut.
Also sass und vergass er in der Burg am Rhein seinen usw.

Doch als das letzte Gut vertan, ging es dem Grafen schlecht; ein andrer Herr
bezog das Schloss, da ward der Graf ein Knecht. Die ganze Woche plagt er
sich im Wirtshaus vor der Burg; was in der Woche er verdient, bracht er am
Sonntag durch. Und dann sass und vergass er im Kellerloch am Rhein seinen
usw.

Und die euch dieses Lied erdacht, die waren selber dort; zu Fuss kam man
den Berg herab, die Gelder waren fort. Man haderte mit dem Geschick und
härmte sich gar sehr; da hörte man vom edlen Graf die wundersame Mär.
Und man sass und vergass vor seiner Burg am Rhein seinen usw.


# Das wilde Heer

Das war der Herr von Rodenstein, der sprach: «Dass Gott mir helf’, gibt’s
nirgend mehr ’nen Tropfen Wein des Nachts um halber zwölf? Raus da! Raus
da aus dem Haus da! Herr Wirt, dass Gott mir helf’, gibt’ s nirgend mehr ’nen
Tropfen Wein : des Nachts um halber zwölf?» :

Er ritt landauf, landab im Trab, kein Wirt liess ihn ins Haus; todkrank noch
seufzt vom Gaul herab er in die Nacht hinaus: «Raus da!» usw.

Und als mit Spiess und Jägersrock sie ihn zu Grab getan, hub selbst die alte
Lumpenglock’ betrübt zu läuten an: «Raus da!» usw.

Doch wem der letzte Schoppen fehlt, den duld’t kein Erdreich nicht, drum
tobt er jetzt, vom Durst gequält, als Geist umher und spricht: «Raus da!» usw.

Und alles, was im Odenwald sein’ Durst noch nicht gestillt, das folgt ihm
bald, es schallt und knallt, das klafft und brüllt: «Raus da!» usw.

Das Lied singt man, wenn’s auch verdriesst, gestrengem Wirt zu Lehr; wer zu
genau die Herberg schliesst, den straft das wilde Heer: «Raus da! Raus da aus
dem Haus da! Rumdiridi Freijagd! Hoidirido Freinacht! Hausknecht hervor!
öffne das Tor! : Raus, raus, raus! :


# Das war der Zwerg Perkeo

Das war der Zwerg Perkeo im Heidelberger Schloss, an Wuchse klein und
winzig, an Durste riesengross. Man schalt ihn einen Narren, er dachte:
«Liebe Leut’, : wär’t ihr wie ich doch alle feuchtfröhlich und gescheut.» :

Und als das Fass, das grosse, mit Wein bestellet war, da ward sein künft’ ger
Standpunkt dem Zwergen völlig klar. «Fahr wohl», sprach er, «o Welt, du
Katzenjammertal, was sie auf dir hantieren, ist wurst mir und egal.»

Um lederne Ideen rauft man manch heissen Kampf, es ist im Grund doch
alles nur Nebel, Rauch und Dampf! Die Wahrheit liegt im Weine. Beim
Weinschlurf sonder End, erklär ich alter Narre fortan mich permanent.»

Perkeo stieg zum Keller; er kam nicht mehr herfür und sog bei fünfzehn
Jahre am rheinischen Malvasier. War’s drunten auch stichdunkel, ihm strahlte
inneres Licht, und wankten auch die Beine, er trank und murrte nicht.

Als er zum Fass gestiegen, stand’s wohlgefüllt und schwer, doch als er kam
zu sterben, klang’s ausgesaugt und leer. Da sprach er fromm: «Nun preiset,
ihr Leute, des Herren Macht, die in mir schwachem Knirpse so Starkes hat
vollbracht.»

«Wie es dem kleinen David gegen Goliath einst gelang, also ich arm
Gezwerge den Riesen Durst bezwang. Nun singt ein de profundis, dass das
Gewölb erdröhnt, das Fass steht auf der Neige, ich falle sieggekrönt.»

Perkeo ward begraben. − Um seine Kellergruft beim leeren Riesenfasse weht
heut noch feuchte Luft. Und wer als frommer Pilger frühmorgens ihr genaht:
Weh ihm! Als Weinvertilger durchtobt er nachts die Stadt!


# Papst und Sultan

Der Papst lebt herrlich in der Welt, er lebt von seinem Ablassgeld, : er trinkt
vom allerbesten Wein; drum möcht’ ich auch der Papst wohl sein. :

Doch nein, er ist ein armer Wicht, ein holdes Mädchen küsst ihn nicht, er
schläft in seinem Bett allein; ich möchte doch der Papst nicht sein.

Der Sultan lebt in Saus und Braus, er wohnt in einem grossen Haus voll
wunderschöner Mägdelein; drum möcht’ ich wohl der Sultan sein.

Doch nein, er ist ein armer Mann, denn folgt er seinem Alkoran, so trinkt er
keinen Tropfen Wein; ich möchte doch nicht Sultan sein.

Getrennt veracht’ ich beider Glück und kehr in meinen Stand zurück, doch
das geh’ ich mit Freuden ein: Bald Papst, bald Sultan möcht’ ich sein.

Drum Mädchen, gib mir einen Kuss, denn jetzt bin ich der Sultanus. Ihr
trauten Brüder, schenket ein, damit ich auch der Papst kann sein.


# Fahrender Schüler

Der Sang ist verschollen, der Wein ist verraucht, stumm irr’ ich und träumend
umher. : Es taumeln die Häuser, vom Sturme umhaucht, es taumeln die
Wellen ins Meer. :

Die Wolken, sie tanzen, manch Sternlein fällt, hat tief in den Wolken gezecht;
ich steh’ wie ein Fels, wie die Angel der Welt, wie ein Kaiser in Freiheit und
Recht.

Und die Strassen durch irr’ ich, die Plätze so schnell, ich klopfe von Hause zu
Haus; bin ein fahrender Schüler, ein wüster Gesell, wer schützt mich vor
Wetter und Graus?

Ein Mägdlein winkt mir vom hohen Altan, hell flackert im Winde ihr Haar.
Ich schlag’ in die Saiten und schwing mich hinan, wie licht ist ihr Aug’ und
wie klar!

Und sie küsst mich und drückt mich und lacht so hell; nie hab ich die Dirne
geschaut. Bin ein fahrender Schüler, ein wüster Gesell, was lacht sie und
küsst mich so traut!


# Der Binschgauer Wallfahrt

: Die Binschgauer wollten wallfahrten gehn, :: sie täten gerne singen und
kunnten’s nit gar schön. : Zschahi, zschaho, zschahiahiaho! Die Binschgauer
sind schon wiederumme do! Jetzt schau fein, dass ein : jeder, :: jeder, :
: jeder, :: sein Ränzele hol :

Die Binschgauer zogen weit vom Heimatland; sie schauten viele Stadel und
wurden rings bekannt. Zschahi usw.

Die Binschgauer hatten lange Freud und Not, bis hoch des Domes Zinne
erglänzt im Abendrot. Zschahi usw.

Die Binschgauer gängen um den Dom herum, die Fahnestang ist broche, jetzt
gängen’s mit dem Trumm. Zschahi usw.

Die Binschgauer gängen in den Dom hinein, die Heil’gen täten schlafen, sie
kunnten’s nit anschrei’n. Zschahi usw.

O heiliger Sankt Florian! Verschone unsre Häuser, zünd lieber andre an!
Zschahi usw.


# Die Gedanken sind frei

Die Gedanken sind frei! Wer kann sie erraten? Sie fliehen vorbei wie
nächtliche Schatten. Kein Mensch kann sie wissen, kein Jäger erschiessen
mit Pulver und Blei: Die Gedanken sind frei!

Ich denke, was ich will und was mich beglücket, doch alles in der Still’ und
wie es sich schicket. Mein Wunsch und Begehren kann niemand verwehren,
es bleibet dabei: Die Gedanken sind frei!

Und sperrt man mich ein im finsteren Kerker, das alles sind rein vergebliche
Werke. Denn meine Gedanken zerreissen die Schranken und Mauern
entzwei: Die Gedanken sind frei!

Drum will ich auf immer den Sorgen entsagen und will mich auch nimmer
mit Grillen mehr plagen. Man kann ja im Herzen stets lachen und scherzen
und denken dabei: Die Gedanken sind frei!

Ich liebe den Wein, mein Mädchen vor allen, sie tut mir allein am besten
gefallen. Bei einem Glas Weine bin ich nicht alleine, mein Mädchen dabei:
Die Gedanken sind frei!


# Dort Saaleck, hier die Rudelsburg

Dort Saaleck, hier die Rudelsburg, und unten tief im Tale da rauschet
zwischen Felsen durch die alte liebe Saale, und Berge hier und Berge dort zur
Rechten und zur Linken − : die Rudelsburg, das ist ein Ort zum Schwärmen
und zum Trinken. :

Das wissen die Studenten auch in Jena und in Halle und trinken dort nach
altem Brauch im Hof und auf dem Walle. Umringt von moosigem Gestein,
wie klingen da die Lieder! Die Saale rauscht so freudig drein, die Berge
hallen wider.

O Vaterland, wie bist du schön mit deinen Saatenfeldern, mit deinen Tälern,
deinen Höhn und all den stolzen Wäldern! O Vaterland, drum wollen wir dir
unsre Lieder singen, zu deinem Preise sollen hier laut Herz und Becher
klingen.

Wie tönet das ins Tal hinein vom Felsen hoch hernieder, – die Saale rauscht
so freudig drein, die Berge hallen wider; und Berge hier und Berge dort zur
Rechten und zur Linken – die Rudelsburg, das ist ein Ort zum Schwärmen
und zum Trinken.

gsw


# Fuxenlied

Dr Früehlig isch eben in d’Lande cho, im Bluescht stoht juscht dr Wy, wer
wott nit us sich use go, wie jede Fux am Rhy? Lueg Mueter, schick di dri, de
muesch mi au verstoh; i wott doch au kei andre si, i schloh im Vatter noh.

So lang dr Rhy no nidsi goht, hänn d’Buebe d’Maitli gern, so lang is s’ Herz
im Lyb no schloht, het jede Fux e Stärn.

Und wott im ein uf d’Seel cho stoh, potz Blitz! Do hau i dri, Harrus! wie will
i Quarte schloh, do sin mir Füx drbi.

Und d’Ehr soll unsre Wahlspruch sy und Alemannetreu; und Heimet, du
muesch frei uns sy, das schwöre mir uf’s neu.


# Lied eines heimziehenden Studenten

Drei Bilder und eine Pfeife, ein Becher und ein Stab : ist alles von meinen
Sachen, was ich gerettet hab’. :

Die Bilder will ich behalten, es sind drei Freunde lieb, von denen ein jeder in
Freude und Leid mir treu verblieb.

Die Pfeife will ich zerschlagen am ersten grossen Stein, das Lied vom alten
Burschen muss ausgepfiffen sein.

Noch einmal füll’ ich den Becher am ersten klaren Quell, dann musst du
scheiden und sterben, du alter treuer Gesell.

Der Stab hat mich geführet, geschützet so mannichmal, er soll mich auch
begleiten durch Berg und Wald und Tal.

Jetzt kommt, ihr Bilder, du Pfeife, du Becher und du Stab − ihr werdet nicht
erzählen, dass ich geweinet hab’.


# Drei Klänge

Drei Klänge sind’s, sie tönen hold und rein voll Harmonie durch unser
Burschenleben, drei Klänge sind’s, die uns wie goldner Wein zu frohem
Schlag das freie Herz erheben; sie will ich preisen noch mit grauem Haar, bis
mich der Tod ins Dunkel zieht hernieder: : Der Schläger Klang, der Gläser
Klang, den Klang der Lieder, sie will ich preisen nun und immerdar! :

Des Schlägers Klang, er tönt so scharf und kühn, für Burschenehre blitzet
seine Klinge; beim Gläserklang so froh die Herzen glühn, trägt sie empor des
Weines Geisterschwinge. Der Lieder Klang hebt sich zum Himmel auf, im
Kreis des Edlen, Guten, Hohen, Schönen, : der Freiheit Lied, der Liebe Lied
es soll ertönen mit goldnem Schall durch unsern Lebenslauf. :

Drei Klänge sind’s von ganz besondrer Art, sie dünken uns die herrlichsten
von allen, darum, ihr Brüder, lasset froh geschart das Jubellied zu ihrem
Ruhm erschallen. Aus, nehmt das Glas mit goldnem Wein zur Hand und ruft
es laut nach alter Burschenweise: : Das Schwert zum Schluss, das Glas aufs
Wohl, das Lied zum Preise für unser schönes, freies Vaterland! :


# Es zog ein Bursch hinaus

Ein Burschenherz in Lieb’ und Lust, an Liedern reich und Sangeslust, wie
schlägt’s so heiss mit unterm Flaus; : Singsang und Klingklang, es zog ein
Bursch hinaus! :

Und wo ein Herz in Liebe heiss, der Bursch es bald zu finden weiss, sein
Herz ist weit, ein weites Haus; Singsang usw.

Lebt wohl, ihr Strassen grad und krumm, ich zieh’ nicht mehr in euch herum,
nicht tönt mein Lied in Saus und Braus; Singsang usw.

Weint’ manche Trän’ die junge Maid dem jungen Blut in Lust und Leid, er
bleibt doch nicht im Vaterhaus. Singsang usw.

Feinsliebchen, scheide ich von dir, dies letzte Liedlein schenk ich dir: Leb
wohl und denk im stillen Haus: Singsang usw.

Und kommt der letzte Augenblick, ich hab’ geliebt, das war mein Glück,
doch nun ist’s aus mit Saus und Braus; Singsang usw.

Der letzte Kuss, der letzte Schmiss, die brannten beide bittersüss; im letzten
Gang die Klinge sprang. Singsang usw.


# Leichter Wanderer

Ein Heller und ein Batzen, die waren beide mein, der Heller ward zu Wasser,
der Batzen ward zu Wein! Juchheidi! fallera falleri falleriaho! der Heller
ward zu Wasser, der Batzen ward zu Wein!

Die Mädel und die Wirtsleut’, die rufen beid’: O weh! Die Wirtsleut’, wenn
ich komme, die Mädel, wenn ich geh’. Juchheidi usw.

Mein’ Stiefel sind zerrissen, mein’ Schuh, die sind entzwei, und draussen auf
der Heiden, da singt der Vogel frei. Juchheidi usw.

Und gäb’s kein’ Landstrass’ nirgend, da säss’ ich still zu Haus, und gäb’s kein
Loch im Fasse, da tränk’ ich gar nicht draus. Juchheidi usw.

Das war ’ne rechte Freude, als mich der Herrgott schuf, ein Kerl wie Samt
und Seide, nur schade, dass er suff. Juchheidi usw.


# Schusterliedchen

Ein Schuster liebte einst ein schönes Mädchen, und er versah sie stets mit
neuen Schuh’n. Sie hatt’ so hübsche Füss’ und runde Wädchen, und sie tat,
was alle Mädchen tun: Sie nahm die Schuh, und liess den Schuster sitzen –
der Schuster sass auf dem Popo, : liess die Schusterahle blitzen, denn
schustern musst’ er sowieso. :

Das schöne Mädchen liebte einen andern, und dieser andre war ein reicher
Mann. Man sah sie oft zur Abendstunde wandern, weil man da viel besser
wandern kann. Der arme Schuster klopfte seine Sohlen von morgens früh bis
spät zur Nacht, : sass als wie auf glüh’nden Kohlen, denn ach, er war so sehr
verkracht. :

Da kam sie eines Tags auf seine Bude, sie war so kugelrund und weinte sehr.
Das war nicht mehr die schlanke, stolze Trude, und sie war auch keine
Jungfrau mehr. Ach, lieber Schuster, kannst du mir verzeihen? Verschollen ist
der reiche Mann! Und der Schuster tat sie freien, wie man im Amtsblatt lesen
kann.

Und die Moral von diesem schönen Märchen: Ein Schuster hat im Leben
nicht nur Pech! Oft geht es nicht einmal ein ganzes Jährchen, denn die
schönen Mädchen sind zu frech. Dann kommt der Schuster wiederum zu
Gnaden, und sitzt er auch nur auf dem Po – hübsche Füss’ und runde Waden
sind über’n Schuster wieder froh.


# Im Zimmer neben mir

Eine kleine süsse Maid, süss zum Fressen schier, : wohnet schon seit ein’ger
Zeit im Zimmer neben mir. :

Morgens steht sie früh schon auf, bringt dem Durst’gen Bier, Kelln’rin ist die
schöne Maid im Zimmer neben mir.

Komm’ ich von der Kneipe heim, morgens um halb vier, steh’n zwei
Schühlein reizend klein vorm Zimmer neben mir.

Einmal kam ich spät nach haus, ich verirrt die Tür und geriet versehentlich
ins Zimmer neben mir.

Was geschah, verrat’ ich nicht, weil ich mich genier. Seither schlaf’ ich jede
Nacht im Zimmer neben mir.


# Leibarzt und Zecher

Einst hat mir mein Leibarzt geboten: Stirb, oder entsage dem Wein! Dem
weissen sowohl als dem roten, : sonst wird es dein Untergang sein! :

Ich hab’ es ihm heilig versprochen, auf etliche Jahre zwar nur; doch schon
nach zwei schrecklichen Wochen, vergass ich den albernen Schwur.

Wie trefflich bekam mir die Speise, wie schlief ich so ruhig die Nacht! Wie
war ich so munter, so weise, so fröhlich zum Sterben gemacht!

Tod, höre! Man hat mir befohlen: Stirb oder entsage dem Wein! Sieh, wann
du willst, kannst du mich holen; hier sitz ich und schenke mir ein!


# Weinmärchen

Einst pocht’ ich an ein einsam’ Haus in weltvergess’nem Tale; der greise
Siedler trat heraus mit weingefüllter Schale. «Da nimm und trinke!» sprach
er mild, «es ist vom irdischen Gefild, das beste Blut der Reben, : so dir ein
Mensch kann geben.» :

Ich trank sie leer, ich hielt sie hin: «Noch eine, nur noch eine! Dann sag dem
Fremdling, der ich bin, wie kamst du zu dem Weine?» Der Alte schüttelte den
Bart: «Such ihn dir selbst auf deiner Fahrt, wirst noch um diesen Tropfen an
manche Türe klopfen.»

Nun hab’ ich nimmer Ruh noch Rast, des Weines muss ich denken, war
seinetwegen schon zu Gast in ungezählten Schenken. Ich such’ ihn auf dem
Erdenrund, am Rhein, im Welschland und Burgund, such’ ihn bei Nacht, bei
Tage, bei jedem Glockenschlage.

Drum kann ich nicht vorübergeh’n, wo Herbergsschilder rosten, kann
nirgend’ Wein verzapfen seh’n, muss jeden einmal kosten. Den einen such’
ich immer nur, und eh’ ich ihm nicht auf der Spur, muss wandern ich und
trinken, bis mir die Äuglein sinken.


# Klärchen

Er stand beim Train und war Sergeante, und sie, sie war Probiermamsell. Sie
aber hatte eine Tante, die führt’ in Hamburg ein Bordell. : Die war so schlau
und rechnet drum die Liebe gleich in Taler um! :

Weil der Sergeant denn so alleine, so tät’ er sich ein Liebchen frei’n. Er
küsste sie im Mondenscheine, und sie, sie sagte auch nicht: «Nein!» : Die
Liebe war ganz fürchterlich, doch Gelder hatten beide nicht. :

Und so zog Klärchen, denn so hiess sie, nach Hamburg zu der Tante hin. Und
der Sergeant, ach Gott, er liess sie mit heissem Kuss von hinnen
zieh’n. : «Ich bleib’ Dir treu!» sprach sie und schluch ’nen Knoten in ihr
Taschentuch. :

In Hamburg nahm die liebe Tante erfreut schön Klärchen in Empfang. «Sei
mir gegrüsst, lieb’ Anverwandte, mach Dir’s bequem und bleib’ recht
lang! : Hier siehst Du, was dem Menschen frommt, und wie man leicht zu
Gelde kommt!» :

Zuerst war Klärchen sehr dagegen, denn sie vermisste die Moral. Da war die
Tante sehr verlegen, ein Fräulein musste ins Spital. : Da macht’ sich Klärchen
nichts daraus und half ein ganz klein wenig aus. :

Der Kundschaft kam das sehr gelegen, denn sie fand Klärchen sehr charmant.
Doch sie, sie tat’s des Geldes wegen! Im Herzen liebt’ sie den
Sergeant. : Und kaum hat sie das nöt’ge Geld, hat den Betrieb sie
eingestellt. :

Sechs Wochen drauf am Traualtare schön Klärchen stand mit dem Sergeant,
den Myrtenkranz trug sie im Haare, der ihrem Blond vortrefflich stand. : Und
so trat Klärchen keusch und rein als Jungfrau in die Ehe ein. :

Und die Moral von der Geschichte, wie Klärchen sie am Morgen fand, und
wie getreulich ich berichte, und wie sie ihrem Mann gestand: : «Viel schöner
ist die Hochzeitsnacht, wenn ’s Lieben keine Schmerzen macht!» :


# Ins Heu

Es hatte ein Bauer ein schönes Weib, die blieb so gerne zu Haus; sie bat oft
ihren lieben Mann, er sollte doch fahren hinaus, er sollte doch fahren ins
Heu, er sollte doch fahren ins ha ha ha ha ha ha Heu, juchhei, juchhei,
juchhei! er sollte doch fahren ins Heu.

Der Mann, der dachte in seinem Sinn: Die Reden, die sind gut! Ich will mich
hinter die Haustür stell’n, will seh’n was meine Frau tut. Will sagen, ich fahre
ins Heu usw.

Da kommt geschlichen ein Reitersknecht zum jungen Weibe hinein, und sie
umfanget gar freundlich ihn, gab stracks ihren Willen darein. «Mein Mann ist
gefahren ins Heu» usw.

Er fasste sie um ihr Gürtelband und schwang sie wohl hin und her; der Mann,
der hinter der Haustür stand, ganz zornig da trat herfür: «Ich bin nicht
gefahren ins Heu» usw.

«Ach trauter, herzallerliebster Mann, vergib mir diesen Fehl! Will lieben
fürbass und herzen dich, will kochen süss Mus und Mehl. Ich dachte, du
wärest ins Heu» usw.

«Und wenn ich gleich gefahren wär’ ins Heu und Haberstroh, so sollst du nun
und nimmermehr einen andern lieben also; der Teufel mag fahren ins Heu!»
usw.


# Fiducit

Es hatten drei Gesellen ein fein Collegium; : es kreiste so fröhlich der Becher
in dem kleinen Kreise herum. :

Sie lachten dazu und sangen und waren froh und frei, des Weltlaufs Elend
und Sorgen, sie gingen an ihnen vorbei.

Da starb von den dreien der eine, der andere folgte ihm nach, und es blieb der
dritte alleine in dem öden Jubelgemach.

Und wenn die Stunde gekommen des Zechens und der Lust, dann tät er die
Becher füllen und sang aus voller Brust.

So sass er einst auch beim Mahle und sang zum Saitenspiel, und zu dem
Wein im Pokale eine helle Träne fiel.

«Ich trink’ euch ein Schmollis, ihr Brüder! Wie sitzt ihr so stumm und so
still? Was soll aus der Welt denn noch werden, wenn keiner mehr trinken
will?»

Da klangen der Gläser dreie und wurden mählich leer: «Fiducit, fröhlicher
Bruder!» Der trank keinen Tropfen mehr.


# Der Hammerschmied

Es ist ja kein Dörflein so kleine, ein Hammerschmied wohnet dareine. Zieh,
Bruder, zieh! Und lass es lustig laufen! So ist’s recht, so ist’s recht! Du sollst
dich nur besaufen! Auf mit dem Hammer, nieder mit ihm, : schmiede das
Eisen so lang es noch warm ist, warm ist, schmiede das Eisen so lang es noch
glüht! :


# Das Herz am Rhein

Es liegt eine Krone im grünen Rhein, gezaubert von Gold und von Edelstein,
und wer sie erhebt vom tiefen Grund, den krönt man zu Aachen in selbiger
Stund; vom Belt bis zur Donau die Lande sind sein, : dem Kaiser der
Zukunft, dem Fürsten am Rhein. :

Es liegt eine Leier im grünen Rhein, gezaubert von Gold und von Elfenbein,
und wer sie erhebt aus tiefem Grund, dem strömen die Lieder begeisternd
vom Mund. Der Kranz der Unsterblichkeit wartet sein, des Sängers der
Zukunft, des Sängers am Rhein.

Ich weiss, wo ein Häuschen am grünen Rhein, umranket von Reblaub die
Fensterlein, drin waltet ein Herz so engelgleich, so arm zwar an Gold, doch
an Unschuld so reich. Gehörte dies Herz an dem Rheine mir, ich gäbe die
Krone, die Leier dafür!


# Der Ichthyosaurus

Es rauscht in den Schachtelhalmen, verdächtig leuchtet das Meer, da
schwimmt mit Tränen im Auge ein Ichthyosaurus daher.

Ihn jammert der Zeiten Verderbnis, denn ein sehr bedenklicher Ton war
neuerlich eingerissen in der Liasformation.

Der Plesiosaurus, der alte, er jubelt in Saus und Braus, der Pterodactylus
selber flog neulich betrunken nach Haus.

Der Iguanodon, der Lümmel, wird frecher zu jeglicher Frist; schon hat er am
hellen Tage die Ichthyosaura geküsst.

Mir ahnt eine Weltkatastrophe, so kann es ja länger nicht geh’n; was soll aus
dem Lias noch werden, wenn solche Dinge gescheh’n?

So klagte der Ichthyosaurus, da ward es ihm kreidig zu Mut; sein letzter
Seufzer verhallte im Qualmen und Zischen der Flut.

Es starb zu derselbigen Stunde die ganze Saurierei, sie kamen zu tief in die
Kreide, da war es natürlich vorbei.

Und der uns hat gesungen dies petrefaktische Lied, der fand’s als fossiles
Albumblatt auf einem Koprolith.


# Si tacuisses!

Es sassen drei Halunken, lunken, an einem Biertisch trunken, trunken, : sie
hielten weisen Rat und täten eine Wett’, wer unter ihnen wohl das schönste
Mädchen hätt’. :

Da war auch einer drunter, das Maul nicht halten kunnt’ er: «Mein Schatz, die
Kunigund, hat mir heut zugelacht, ich dürfe bei ihr sein die liebe lange
Nacht!»

Das Mädchen stand im Gärtli und hörte jedes Wörtli; «Wart, wart, ich will dir
schon die Lust vertreiben fein: Kommst du vor meine Tür, ich lass’ dich nicht
herein!»

Des Morgens um halb viere stand er vor ihrer Türe; er klopfte dreimal an mit
seinem Siegelring: «Schläfst oder wachest du, herzallerliebstes Kind?»

«Mag schlafen oder wachen, ich tu dir nicht aufmachen! Geh du nur immer
hin, wo du gewesen hast und binde deinen Gaul an einen dürren Ast!»

«Wohin soll ich nun reiten? Es schlafen alle Leuten! Es regnet und es schneit
und geht ein kühler Wind; es schlafen alle Leut’ und alle Burgerskind!»

«Das tut mich gar nicht rühren, dass dir das tut passieren! Denn wer ein
Mädchen hat und sagt es jedermann, der klopft denn auch wie du gar oft
vergebens an!»

Da sprachen die Herrn Hausknechte: «Dem Kerl geschieht ganz rechte! Hätt’
er geschwiegen still und’s Maul gehalten fein, so läg er heute nacht beim
schönsten Mägdelein!»


# Es war ein Knabe gezogen

Es war ein Knabe gezogen wohl in die Welt hinaus, und ob ihm sein Schatz
auch gewogen, das Glück, das Glück war aus. : Und er wanderte weit zur
Sommerszeit, wenn am Walde die Rosen blüh’n. :

(Wärst du so hoch nicht geboren und ich nicht ein armer Knab’, die Liebe,
die Lieb’ ist verloren, die Welt ist leer wie ein Grab. Doch was soll mir mein
Leid zur Sommerszeit, wenn am Walde die Rosen blüh’n.)

Das Mägdelein barg seine Klagen im stillen Kämmerlein, sie durfte es
niemandem sagen, sie hoffte jahraus und jahrein. Und sah über die Heid’ zur
Sommerszeit, wenn am Walde die Rosen blüh’n.

Es kam ein Reiter geflogen, die Locken, sie wehten im Wind: «Hei, bist du
mir heut noch gewogen, herzallerliebstes Kind?» Und da lachten sie beid zur
Sommerszeit, wenn am Walde die Rosen blüh’n.

Er hielt sie in seinen Armen, das Herz ihm vor Wonne schlug, und hatte die
Welt nicht Erbarmen, die Liebe, die Lieb’ war stark genug! Und da küssten
sich beid’ zur Sommerszeit, wenn am Walde die Rosen blüh’n.


# Der König in Thule

Es war ein König in Thule gar treu bis an das Grab, dem sterbend seine
Buhle einen goldenen Becher gab.

Es ging ihm nichts darüber, er leert’ ihn jeden Schmaus, die Augen gingen
ihm über, so oft er trank daraus.

Und als er kam zum Sterben, zählt’ er seine Städt’ im Reich, gönnt’ alles
seinen Erben, den Becher nicht zugleich.

Er sass beim Königsmahle, die Ritter um ihn her, auf hohem Vätersaale, dort
auf dem Schloss am Meer.

Dort stand der alte Zecher, trank letzte Lebensglut und warf den heil’gen
Becher hinunter in die Flut.

Er sah ihn stürzen, trinken und sinken tief ins Meer. Die Augen täten ihm
sinken, trank nie ein’ Tropfen mehr.


# Der Harung

Mit «Couleurstrophen»

Es war einmal ein Harung, der grämte sich gar sehr, : dass man sein Weib
gefangen, zu Amsterdam am Meer. :

Es sassen zwei Studenten im Münchner Hofbräuhaus, zog jeder aus der
Tasche einen Harung heraus.

Sie schnitten sie in Stücke mit kunstgerechter Hand, und warfen ihre Seelen
zusammen an die Wand.

Sprach eine zu der andern: «Erkennst du mich nicht mehr? War einst dein
treuer Buhle, zu Amsterdam am Meer.»

Hieraus kann man ersehen die wundersame Mär: Es treffen sich die Seelen
zu Lande und zu Meer.

Und diese letzte Strophe, sie ist mein einz’ ger Spass: Es treffen sich
Rhenanen im Kübel auf dem Fass.

Und diese allerletzte Strophe, ich sing si hüt und morn: Es treffen sich
Alemannen im Basler Löwenzorn.

Und diese allerletzte Strophe, sie ist mein einz’ger Trost: Es treffen sich
Utonen im Schänzli und im Ost.

Und diese allerletzte Strophe, man hört sie nicht mehr viel: Es treffen sich
Rhodanen zu Genf im Krokodil.

Und diese allerletzte Strophe, man stimmt sie kaum mehr an: Es treffen sich
Jurassen im Vaudois zu Lausanne.


# Es wollt’ ein Mädel

Es wollt’ ein Mädel wohl auf ein Schiff, ein Jungmatrose zu ihm spricht: : Ei
wohin denn, du wunderschönes Mägdelein, sollst heute Nacht meine
Beischläfrin sein; denn ich schlaf ja so alleine. :

Beischläfrin sein, das kann ich nicht, wenn das nur meine Mutter wüsst; denn
sie hat mich von zu Hause fortgeschickt, hat mir einen Taler in die Hand
gedrückt für so ein’n Jungmatrosen.

Er nahm das Mägdelein wohl bei der Hand, und führt’ sie hinunter an den
Strand; und sie schliefen so fröhlich beisammen, bis dass der helle, helle Tag
erwacht, und das Schifflein fuhr von dannen.

Auf, auf Matrosen es ist jetzt Zeit, macht euch zur grossen Fahrt bereit! Und
sie hoben die Anker in die Höhe, hissten die Segel bis ganz oben auf den
Mast, und das Schifflein fuhr von dannen.

Und als das Mädel vom Schlaf erwacht, da fing es bitterlich zu weinen an:
Ei, wo hab ich die Ehre denn gelassen, bei einem jungen, jungen
Schiffsmatros’, der mich schmählich hat verlassen.

Und als das Mädel nach Hause kam, da fing die Mutter zu schelten an: Ei wo
bist du Luder denn gewesen, habe dich die liebe lange Nacht gesucht, mit der
Stalllaterne und dem Besen.


# Es zogen auf sonnigen Wegen

Es zogen auf sonnigen Wegen drei lachende Mädel durchs Land. Sie
schwenkten die Röcke verwegen und sangen so allerhand, : die erste mit dem
Schopf, die zweite mit dem Zopf, die dritte mit dem goldenen Lockenkopf. :

Sie schwenkten verwegen die Beine und sangen ein Liedchen dabei. Ich
wurd’ mir nicht schlüssig für eine, drum küsst’ ich sie alle drei, die erste usw.

Jedoch eine jede wollt’ haben, dass ich ihr Alleiniger sei. Kein Drittel, den
ganzen Knaben, den wollten sie alle drei, die erste usw.

Du Schwarze, du Blonde, du Braune, vergib und vergiss und verzeih. Wollt’
keiner verderben die Laune, drum küsst’ ich euch alle drei, die erste usw.

Und sollte mich einer mal fragen, warum ich geküsst alle drei, so könnt’ ich
ihm eines nur sagen: Es war keine vierte dabei; die erste usw.

Erhebet das Glas, Kavaliere, und stosst allesamt mit mir an: Es lebe der Wein
und die Liebe und alles was drum ist und dran, die erste usw.


# Der Wirtin Töchterlein

Es zogen drei Burschen wohl über den Rhein, : bei einer Frau Wirtin da
kehrten sie ein: «Frau Wirtin, hat Sie gut Bier und Wein? Wo hat Sie ihr
schönes Töchterlein?» :

«Mein Bier und Wein ist frisch und klar, − mein Töchterlein liegt auf der
Totenbahr’». Und als sie traten zur Kammer hinein, da lag sie in einem
schwarzen Schrein.

Der erste, der schlug den Schleier zurück und schaute sie an mit traurigem
Blick: «Ach, lebtest du noch, du schöne Maid! Ich würde dich lieben von
dieser Zeit!»

Der zweite deckte den Schleier zu und kehrte sich ab und weinte dazu: «Ach,
dass du liegst auf der Totenbahr’! Ich hab’ dich geliebet so manches Jahr!»

Der dritte hub ihn wieder sogleich und küsste sie an den Mund so bleich:
«Dich liebt’ ich immer, dich lieb’ ich noch heut und werde dich lieben in
Ewigkeit.»


# Fünf Banner flattern

Fünf Banner flattern die Strasse entlang, in der Sonne blitzen Rapiere, und
dröhnend hallet der Burschengesang, wir ziehen aus zum Turniere. Im Auge
den Frohsinn, im Arme die Kraft, rückt aus Akademias Turnerschaft.

Wir tragen im Herzen den goldenen Spruch: «Mens sana in corpore sano.» Es
strahlet vom seidenen Bannertuch: «Mens sana in corpore sano.» Wer die
Weisheit sucht, wer die Trägheit bezwingt, der ist’s, der im Leben den Kranz
erringt.

Wo Jugendfreude, wo Tatenlust im Herzen des Menschen hauset, wo
Schweizerblut in der Burschenbrust wie der Wildbach des Hochlandes
brauset, da reift vom Rhein bis zum Rhonestrand eine wack’re Schar dem
Vaterland.

Und blickt ins Auge der Freund dem Freund, wenn stolz unsre Farben
erglänzen, und sind wir beim vollen Becher vereint, unter Rosen- und
Eichenlaubkränzen, dann hallt’s in der Runde voll feuriger Kraft: Ein Hoch
Akademias Turnerschaft!


# Das Lied von der SAT

Fünf Banner seh’ ich wehen im lieben Schweizerland! Studenten sie
betreuen, den Schläger in der Hand. Bereit zu jedem Gange für Freiheit und
für Ehr’, als gute Eidgenossen, der Heimat Schutz und Wehr. Rhenanen-,
Alemannen- und jung Utonenblut, Rhodanen und Jurassen in Band und
Farbenhut. Man kennt uns aller Orten, vom Berg bis an die See, : Wir sind
die Turnerschaften, wir sind die SAT! :

Beim Wettkampf auf dem Rasen, in Schnee und Sonnenschein, von guten
Kameraden wird einer Sieger sein. Und singen hell die Schläger und heisst’s:
«Auf die Mensur!» Fest steht der SATer, die Klinge zieht die Spur.
Rhenanen-, Alemannen- und jung Utonenblut, Rhodanen und Jurassen in
Band und Farbenhut. Man kennt uns aller Orten, vom Berg bis an die
See, : wir werden’s immer wagen! Wir sind die SAT! :

Wir heben hoch die Gläser, in trauter Freunde Kreis, die alten Lieder leben,
die Herzen werden heiss. Doch lacht dem flotten Burschen ein süsser
Mädchenmund; wer will es ihm verwehren? Er küsst sich dran gesund.
Rhenanen-, Alemannen- und jung Utonenblut, Rhodanen und Jurassen in
Band und Farbenhut. Man kennt uns aller Orten, vom Berg bis an den
See, : die fröhlichen Gesellen von unsrer SAT! :

Und winkt aus alten Zeiten uns die Erinnerung; zum Teufel die Semester,
dann sind wir wieder jung! So stehen wir zusammen in Treue allezeit, die
Jungen und die Alten, zu jeder Tat bereit. Rhenanen-, Alemannen- und jung
Utonenblut, Rhodanen und Jurassen in Band und Farbenhut. Gradaus in allen
Dingen, was immer auch gescheh’, : wir werden es schon zwingen, wir sind
die SAT! :
